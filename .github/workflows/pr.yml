name: Pr

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Setup Tooling
        uses: jdx/mise-action@d6e32c1796099e0f1f3ac741c220a8b7eae9e5dd
        with:
          install: true
          cache: true
          experimental: true

      - name: Setup Project
        run: mise run setup

      - name: Lint and format check (repo-wide)
        run: mise run check

      - name: Typecheck, test, and build each package
        run: |
          for pkg in packages/*; do
            [ -f "$pkg/package.json" ] || continue
            echo "::group::$pkg"
            mise run typecheck --package "$pkg"
            mise run test --package "$pkg"
            mise run build --package "$pkg"
            echo "::endgroup::"
          done
